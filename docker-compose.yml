services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - gateway
      - chat-service-1
      - chat-service-2
    networks:
      - chat-net

  gateway:
    build: ./gateway
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - DB_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/chatdb
    depends_on:
      - redis
      - postgres
    networks:
      - chat-net

  chat-service-1:
    build: ./chat-service
    environment:
      - PORT=5000
      - INSTANCE_ID=chat-1
      - REDIS_URL=redis://redis:6379
      - DB_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/chatdb
      - JWT_SECRET=${JWT_SECRET}
      - PUSH_SERVICE_URL=http://message-service:6000/push
    depends_on:
      - redis
      - postgres
    networks:
      - chat-net

  chat-service-2:
    build: ./chat-service
    environment:
      - PORT=5000
      - INSTANCE_ID=chat-2
      - REDIS_URL=redis://redis:6379
      - DB_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/chatdb
      - JWT_SECRET=${JWT_SECRET}
      - PUSH_SERVICE_URL=http://message-service:6000/push
    depends_on:
      - redis
      - postgres
    networks:
      - chat-net

  message-service:
    build: ./message-service
    environment:
      - PORT=6000
      - REDIS_URL=redis://redis:6379
      - DB_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/chatdb
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
    depends_on:
      - redis
      - postgres
    networks:
      - chat-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - chat-net

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=chatdb
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - chat-net

volumes:
  redis-data:
  pg-data:

networks:
  chat-net:
    driver: bridge